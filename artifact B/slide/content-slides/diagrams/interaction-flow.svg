<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Discovery Compass turns intent into a visible, steerable loop</title>
  <desc id="desc">A five-step listener loop from anchors to steering, followed by AI, deterministic logic, and fallback responsibility cards.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">Discovery Compass turns intent into a visible, steerable loop</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">AI interprets language; deterministic logic owns constraints, ranking, and measurement</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="175" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="60" dy="0">LISTENER LOOP</tspan></text><rect x="50" y="225" width="278" height="235" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="3"/><circle cx="94" cy="270" r="28" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="94" y="279" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="94" dy="0">1</tspan></text><text x="132" y="279" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="132" dy="0">Anchor</tspan></text><text x="74" y="350" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="74" dy="0">Choose 3–5</tspan><tspan x="74" dy="36">representative tracks</tspan></text><line x1="328" y1="342" x2="350" y2="342" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="358" y="225" width="278" height="235" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="3"/><circle cx="402" cy="270" r="28" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="402" y="279" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="402" dy="0">2</tspan></text><text x="440" y="279" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="440" dy="0">Express</tspan></text><text x="382" y="350" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="382" dy="0">Describe what</tspan><tspan x="382" dy="36">fits right now</tspan></text><line x1="636" y1="342" x2="658" y2="342" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="666" y="225" width="278" height="235" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><circle cx="710" cy="270" r="28" fill="#247A5A" stroke="#247A5A" stroke-width="2"/><text x="710" y="279" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="710" dy="0">3</tspan></text><text x="748" y="279" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="748" dy="0">Approve</tspan></text><text x="690" y="350" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="690" dy="0">Edit intent +</tspan><tspan x="690" dy="36">set novelty</tspan></text><line x1="944" y1="342" x2="966" y2="342" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="974" y="225" width="278" height="235" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="3"/><circle cx="1018" cy="270" r="28" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="1018" y="279" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="1018" dy="0">4</tspan></text><text x="1056" y="279" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="1056" dy="0">Explore</tspan></text><text x="998" y="350" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="998" dy="0">Review 8–12</tspan><tspan x="998" dy="36">grounded results</tspan></text><line x1="1252" y1="342" x2="1274" y2="342" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1282" y="225" width="278" height="235" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><circle cx="1326" cy="270" r="28" fill="#247A5A" stroke="#247A5A" stroke-width="2"/><text x="1326" y="279" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="1326" dy="0">5</tspan></text><text x="1364" y="279" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="1364" dy="0">Steer</tspan></text><text x="1306" y="350" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="1306" dy="0">Save · reject ·</tspan><tspan x="1306" dy="36">refine · rerank</tspan></text><polyline points="1435,460 1435,505 126,505 126,472" fill="none" stroke="#247A5A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><rect x="50" y="565" width="475" height="225" rx="22" fill="#DCE8F8" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="80" y="612" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="80" dy="0">AI: LANGUAGE BOUNDARY</tspan></text><text x="80" y="657" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="80" dy="0">Parse flexible intent</tspan><tspan x="80" dy="40">Interpret refinements</tspan><tspan x="80" dy="40">Draft grounded fit reasons</tspan></text><rect x="563" y="565" width="635" height="225" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#142033" stroke-width="2"/><text x="593" y="612" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="593" dy="0">DETERMINISTIC PRODUCT LOGIC</tspan></text><text x="593" y="657" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="593" dy="0">Hard exclusions · eligibility · repeat penalties</tspan><tspan x="593" dy="40">Novelty · diversity · artist caps · ranking</tspan><tspan x="593" dy="40">Assignment, event logging, and experiment metrics</tspan></text><rect x="1235" y="565" width="315" height="225" rx="22" fill="#F8DDD6" fill-opacity="1" stroke="#D95D43" stroke-width="2"/><text x="1265" y="612" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="1265" dy="0">SAFE FALLBACK</tspan></text><text x="1265" y="657" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="1265" dy="0">Direct controls</tspan><tspan x="1265" dy="36">Template reasons</tspan><tspan x="1265" dy="36">Never relax exclusions</tspan><tspan x="1265" dy="36">silently</tspan></text>
</svg>