<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Competitors guide discovery, but editable intent is still fragmented</title>
  <desc id="desc">Four competitor cards compare Spotify, Apple Music, YouTube, and TIDAL, ending in a white-space statement for session-scoped editable intent.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">Competitors guide discovery, but editable intent is still fragmented</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">First-party product capability comparison — not a performance benchmark</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="175" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="60" dy="0">CURRENT PRODUCT PATTERN</tspan></text><rect x="45" y="205" width="360" height="510" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="3"/><text x="70" y="258" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="70" dy="0">Spotify</tspan></text><line x1="70" y1="280" x2="380" y2="280" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="70" y="319" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="70" dy="0">WHAT EXISTS</tspan></text><text x="70" y="358" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="70" dy="0">DJ requests</tspan><tspan x="70" dy="35">Prompted Playlist beta</tspan><tspan x="70" dy="35">DW genre controls</tspan></text><text x="70" y="500" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="70" dy="0">STRENGTH</tspan></text><text x="70" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="70" dy="0">Multiple guided surfaces</tspan></text><text x="70" y="610" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="70" dy="0">OPEN GAP</tspan></text><text x="70" y="650" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="70" dy="0">Control is split across surfaces</tspan></text><rect x="435" y="205" width="360" height="510" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="460" y="258" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="460" dy="0">Apple Music</tspan></text><line x1="460" y1="280" x2="770" y2="280" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="460" y="319" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="460" dy="0">WHAT EXISTS</tspan></text><text x="460" y="358" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="460" dy="0">Discovery Station</tspan><tspan x="460" dy="35">Home suggestions</tspan><tspan x="460" dy="35">New exploration</tspan></text><text x="460" y="500" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="460" dy="0">STRENGTH</tspan></text><text x="460" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="460" dy="0">Low-friction continuous play</tspan></text><text x="460" y="610" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="460" dy="0">OPEN GAP</tspan></text><text x="460" y="650" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="460" dy="0">Limited visible intent editing</tspan></text><rect x="825" y="205" width="360" height="510" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="850" y="258" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="850" dy="0">YouTube</tspan></text><line x1="850" y1="280" x2="1160" y2="280" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="850" y="319" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="850" dy="0">WHAT EXISTS</tspan></text><text x="850" y="358" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="850" dy="0">Samples feed</tspan><tspan x="850" dy="35">Short-form preview</tspan><tspan x="850" dy="35">Save / deepen actions</tspan></text><text x="850" y="500" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="850" dy="0">STRENGTH</tspan></text><text x="850" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="850" dy="0">Fast audition loop</tspan></text><text x="850" y="610" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="850" dy="0">OPEN GAP</tspan></text><text x="850" y="650" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="850" dy="0">Weak session constraint model</tspan></text><rect x="1215" y="205" width="360" height="510" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="1240" y="258" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1240" dy="0">TIDAL</tspan></text><line x1="1240" y1="280" x2="1550" y2="280" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="1240" y="319" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="1240" dy="0">WHAT EXISTS</tspan></text><text x="1240" y="358" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="1240" dy="0">Daily Discovery</tspan><tspan x="1240" dy="35">10 tracks daily</tspan><tspan x="1240" dy="35">Listening-led profile</tspan></text><text x="1240" y="500" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="1240" dy="0">STRENGTH</tspan></text><text x="1240" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="1240" dy="0">Bounded daily set</tspan></text><text x="1240" y="610" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="1240" dy="0">OPEN GAP</tspan></text><text x="1240" y="650" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="1240" dy="0">History remains primary input</tspan></text><rect x="45" y="745" width="1530" height="105" rx="18" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><text x="75" y="789" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="75" dy="0">WHITE SPACE</tspan></text><text x="255" y="780" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="255" dy="0">One session-scoped loop with explicit intent, editable constraints and novelty control—</tspan><tspan x="255" dy="31">plus a visible response to feedback.</tspan></text>
</svg>