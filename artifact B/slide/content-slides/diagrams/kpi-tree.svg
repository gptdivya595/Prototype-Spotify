<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The North Star rewards accepted novelty without sacrificing relevance</title>
  <desc id="desc">A KPI tree breaks accepted novel artist rate into relevance, novelty, acceptance, and qualified-session drivers, with leading, lagging, and guardrail metrics.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">The North Star rewards accepted novelty without sacrificing relevance</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">A metric tree connects session behavior to durable value while guardrails control downside</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <rect x="465" y="165" width="670" height="120" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="4"/><text x="800" y="207" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850" fill="#247A5A" letter-spacing="0"><tspan x="800" dy="0">NORTH STAR</tspan></text><text x="800" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="800" dy="0">Accepted novel artist rate / qualified session</tspan></text><line x1="800" y1="285" x2="220" y2="350" stroke="#247A5A" stroke-width="3" stroke-linecap="round"/><rect x="45" y="350" width="350" height="200" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="70" y="398" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="70" dy="0">Relevant</tspan></text><text x="70" y="447" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="70" dy="0">Fit rating ↑</tspan></text><text x="70" y="490" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="70" dy="0">Early rejects ↓</tspan></text><line x1="800" y1="285" x2="610" y2="350" stroke="#247A5A" stroke-width="3" stroke-linecap="round"/><rect x="435" y="350" width="350" height="200" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="460" y="398" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="460" dy="0">Novel</tspan></text><text x="460" y="447" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="460" dy="0">New-to-profile share ↑</tspan></text><text x="460" y="490" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="460" dy="0">Artist concentration ↓</tspan></text><line x1="800" y1="285" x2="1000" y2="350" stroke="#247A5A" stroke-width="3" stroke-linecap="round"/><rect x="825" y="350" width="350" height="200" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="850" y="398" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="850" dy="0">Accepted</tspan></text><text x="850" y="447" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="850" dy="0">Save / positive action</tspan></text><text x="850" y="490" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="850" dy="0">Time to first save ↓</tspan></text><line x1="800" y1="285" x2="1390" y2="350" stroke="#247A5A" stroke-width="3" stroke-linecap="round"/><rect x="1215" y="350" width="350" height="200" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="1240" y="398" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="1240" dy="0">Qualified</tspan></text><text x="1240" y="447" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="1240" dy="0">Intent approved</tspan></text><text x="1240" y="490" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="1240" dy="0">≥ 8 eligible tracks</tspan></text><rect x="45" y="600" width="710" height="175" rx="22" fill="#DCE8F8" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="75" y="646" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="75" dy="0">LEADING → LAGGING</tspan></text><text x="75" y="692" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="750" fill="#142033" letter-spacing="0"><tspan x="75" dy="0">Intent completion · first-set acceptance · time to first save</tspan><tspan x="75" dy="38">→ 7-day replay of accepted discoveries</tspan></text><rect x="805" y="600" width="750" height="175" rx="22" fill="#F8DDD6" fill-opacity="1" stroke="#D95D43" stroke-width="2"/><text x="835" y="646" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="835" dy="0">GUARDRAILS</tspan></text><text x="835" y="692" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="750" fill="#142033" letter-spacing="0"><tspan x="835" dy="0">Known-music satisfaction · setup effort · latency</tspan><tspan x="835" dy="38">Invalid output · catalog coverage · privacy incidents</tspan></text><rect x="45" y="810" width="1510" height="48" rx="14" fill="#FFFFFF" fill-opacity="1" stroke="#142033" stroke-width="2"/><text x="800" y="842" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="800" dy="0">Scale only when the North Star improves and every guardrail remains inside its pre-registered limit.</tspan></text>
</svg>