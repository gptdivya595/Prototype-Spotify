<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The journey breaks when current intent is compressed into weak signals</title>
  <desc id="desc">Five stages show the discovery journey from trigger to outcome, with the break at expressing intent and an intervention before ranking.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">The journey breaks when current intent is compressed into weak signals</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">The intervention belongs before ranking, not after another disappointing queue</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="175" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="60" dy="0">CURRENT JOURNEY</tspan></text><circle cx="97" cy="235" r="32" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="97" y="244" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="97" dy="0">1</tspan></text><rect x="55" y="295" width="270" height="300" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="75" y="342" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="75" dy="0">Trigger</tspan></text><text x="75" y="395" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="75" dy="0">Need music for</tspan><tspan x="75" dy="35">this moment</tspan></text><line x1="75" y1="490" x2="305" y2="490" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="75" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="75" dy="0">High intent</tspan></text><line x1="325" y1="445" x2="350" y2="445" stroke="#9DB4D6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="402" cy="235" r="32" fill="#D95D43" stroke="#D95D43" stroke-width="2"/><text x="402" y="244" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="402" dy="0">2</tspan></text><rect x="360" y="295" width="270" height="300" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#D95D43" stroke-width="3"/><text x="380" y="342" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="380" dy="0">Express</tspan></text><text x="380" y="395" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="380" dy="0">Choose surface</tspan><tspan x="380" dy="35">or type a search</tspan></text><line x1="380" y1="490" x2="610" y2="490" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="380" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="380" dy="0">Intent becomes lossy</tspan></text><line x1="630" y1="445" x2="655" y2="445" stroke="#9DB4D6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="707" cy="235" r="32" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="707" y="244" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="707" dy="0">3</tspan></text><rect x="665" y="295" width="270" height="300" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="685" y="342" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="685" dy="0">Evaluate</tspan></text><text x="685" y="395" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="685" dy="0">Scan familiar or</tspan><tspan x="685" dy="35">repeated results</tspan></text><line x1="685" y1="490" x2="915" y2="490" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="685" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="685" dy="0">Trust falls</tspan></text><line x1="935" y1="445" x2="960" y2="445" stroke="#9DB4D6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="1012" cy="235" r="32" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="1012" y="244" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="1012" dy="0">4</tspan></text><rect x="970" y="295" width="270" height="300" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="990" y="342" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="990" dy="0">Recover</tspan></text><text x="990" y="395" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="990" dy="0">Skip · refine ·</tspan><tspan x="990" dy="35">build · leave</tspan></text><line x1="990" y1="490" x2="1220" y2="490" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="990" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="990" dy="0">Effort rises</tspan></text><line x1="1240" y1="445" x2="1265" y2="445" stroke="#9DB4D6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="1317" cy="235" r="32" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="1317" y="244" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="1317" dy="0">5</tspan></text><rect x="1275" y="295" width="270" height="300" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="1295" y="342" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="1295" dy="0">Outcome</tspan></text><text x="1295" y="395" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="1295" dy="0">Save a discovery</tspan><tspan x="1295" dy="35">or abandon</tspan></text><line x1="1295" y1="490" x2="1525" y2="490" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="1295" y="540" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="1295" dy="0">Progress varies</tspan></text><rect x="360" y="635" width="1190" height="170" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><text x="395" y="680" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="395" dy="0">INTERVENE AT STAGE 2</tspan></text><text x="395" y="730" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="395" dy="0">Capture and confirm current intent before ranking—then keep every change visible and reversible.</tspan></text><text x="395" y="775" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#667085" letter-spacing="0"><tspan x="395" dy="0">Out of scope now: replacing playback, claiming perfect personalization, or repairing Spotify&apos;s global profile.</tspan></text><line x1="495" y1="595" x2="495" y2="635" stroke="#247A5A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>