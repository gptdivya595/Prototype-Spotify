<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Discovery failures can reinforce the same recommendation loop</title>
  <desc id="desc">A five-step loop connects past behavior, missing current intent, familiar ranking, recovery work, and noisy feedback, with counterevidence and a design implication.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">Discovery failures can reinforce the same recommendation loop</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">Reported behavior explains a mechanism; counterevidence prevents an absolute claim</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="175" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="60" dy="0">EVIDENCE-BACKED BEHAVIOR LOOP</tspan></text><circle cx="97" cy="267" r="35" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="97" y="277" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="97" dy="0">1</tspan></text><rect x="55" y="325" width="270" height="150" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="75" y="375" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="75" dy="0">Past behavior</tspan></text><text x="75" y="418" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#667085" letter-spacing="0"><tspan x="75" dy="0">Persistent profile</tspan></text><line x1="325" y1="400" x2="350" y2="400" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="402" cy="267" r="35" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="402" y="277" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="402" dy="0">2</tspan></text><rect x="360" y="325" width="270" height="150" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="380" y="375" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="380" dy="0">Intent missing</tspan></text><text x="380" y="418" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#667085" letter-spacing="0"><tspan x="380" dy="0">Moment stays implicit</tspan></text><line x1="630" y1="400" x2="655" y2="400" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="707" cy="267" r="35" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="707" y="277" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="707" dy="0">3</tspan></text><rect x="665" y="325" width="270" height="150" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="685" y="375" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="685" dy="0">Familiar cluster</tspan></text><text x="685" y="418" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#667085" letter-spacing="0"><tspan x="685" dy="0">Repeatedly ranked</tspan></text><line x1="935" y1="400" x2="960" y2="400" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="1012" cy="267" r="35" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="1012" y="277" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="1012" dy="0">4</tspan></text><rect x="970" y="325" width="270" height="150" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="990" y="375" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="990" dy="0">Recovery work</tspan></text><text x="990" y="418" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#667085" letter-spacing="0"><tspan x="990" dy="0">Skip · search · leave</tspan></text><line x1="1240" y1="400" x2="1265" y2="400" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="1317" cy="267" r="35" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="1317" y="277" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="1317" dy="0">5</tspan></text><rect x="1275" y="325" width="270" height="150" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="1295" y="375" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1295" dy="0">Noisy feedback</tspan></text><text x="1295" y="418" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#667085" letter-spacing="0"><tspan x="1295" dy="0">Loop learns little</tspan></text><polyline points="1455,475 1455,525 95,525 95,485" fill="none" stroke="#145FCC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><rect x="55" y="585" width="720" height="195" rx="22" fill="#F8DDD6" fill-opacity="1" stroke="#D95D43" stroke-width="2"/><text x="85" y="627" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="85" dy="0">COUNTEREVIDENCE LIMITS THE CLAIM</tspan></text><text x="85" y="674" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="85" dy="0">Some listeners value familiarity; some surfaces</tspan><tspan x="85" dy="36">work well. The problem is not universal failure.</tspan></text><rect x="825" y="585" width="720" height="195" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><text x="855" y="627" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="855" dy="0">DESIGN IMPLICATION</tspan></text><text x="855" y="674" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750" fill="#142033" letter-spacing="0"><tspan x="855" dy="0">Make current intent explicit and novelty optional,</tspan><tspan x="855" dy="36">session-scoped, editable, and reversible.</tspan></text>
</svg>