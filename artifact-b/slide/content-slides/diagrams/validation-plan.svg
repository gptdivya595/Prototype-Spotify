<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Validate willingness and incremental value before integration</title>
  <desc id="desc">A paired baseline and Discovery Compass validation plan plus three empty survey chart placeholders for intent willingness, valued control, and recalled failure modes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">Validate willingness and incremental value before integration</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">Survey describes demand; the paired prototype tests whether the mechanism causes better outcomes</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <rect x="55" y="160" width="245" height="42" rx="21" fill="#DCE8F8" fill-opacity="1" stroke="#DCE8F8" stroke-width="1"/><text x="177.5" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#145FCC" letter-spacing="0"><tspan x="177.5" dy="0">PAIRED PROTOTYPE TEST</tspan></text><rect x="55" y="220" width="360" height="180" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="85" y="265" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="85" dy="0">Qualified participant</tspan></text><text x="85" y="307" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#667085" letter-spacing="0"><tspan x="85" dy="0">Monthly-or-more discovery</tspan><tspan x="85" dy="34">Same prompt + candidate pool</tspan></text><line x1="415" y1="310" x2="490" y2="310" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="510" y="185" width="350" height="125" rx="22" fill="#DCE8F8" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="540" y="230" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="540" dy="0">A · Unguided baseline</tspan></text><text x="540" y="271" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#667085" letter-spacing="0"><tspan x="540" dy="0">Current discovery controls</tspan></text><rect x="510" y="330" width="350" height="125" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><text x="540" y="375" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#247A5A" letter-spacing="0"><tspan x="540" dy="0">B · Discovery Compass</tspan></text><text x="540" y="416" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="540" dy="0">Intent + novelty + feedback</tspan></text><line x1="860" y1="248" x2="930" y2="310" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="860" y1="392" x2="930" y2="330" stroke="#247A5A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="950" y="220" width="595" height="180" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#142033" stroke-width="2"/><text x="980" y="265" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#667085" letter-spacing="0"><tspan x="980" dy="0">PRE-REGISTERED COMPARISON</tspan></text><text x="980" y="310" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#142033" letter-spacing="0"><tspan x="980" dy="0">Accepted novel artists · time to first save</tspan><tspan x="980" dy="38">Relevance confidence · setup effort · guardrails</tspan></text><text x="55" y="515" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="55" dy="0">SURVEY SPACE — POPULATE ONLY AFTER REAL RESPONSES</tspan></text><rect x="55" y="550" width="470" height="205" rx="22" fill="url(#pending)" fill-opacity="1" stroke="#145FCC" stroke-width="2" stroke-dasharray="10 8"/><rect x="80" y="575" width="75" height="42" rx="21" fill="#145FCC" fill-opacity="1" stroke="#145FCC" stroke-width="1"/><text x="117.5" y="603" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="0"><tspan x="117.5" dy="0">Q14</tspan></text><text x="80" y="655" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="80" dy="0">Intent-step willingness</tspan></text><text x="80" y="697" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#667085" letter-spacing="0"><tspan x="80" dy="0">Donut · Yes / depends / no</tspan></text><text x="500" y="728" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="500" dy="0">AWAITING n</tspan></text><rect x="560" y="550" width="470" height="205" rx="22" fill="url(#pending)" fill-opacity="1" stroke="#145FCC" stroke-width="2" stroke-dasharray="10 8"/><rect x="585" y="575" width="75" height="42" rx="21" fill="#145FCC" fill-opacity="1" stroke="#145FCC" stroke-width="1"/><text x="622.5" y="603" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="0"><tspan x="622.5" dy="0">Q15</tspan></text><text x="585" y="655" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="585" dy="0">Most valued control</tspan></text><text x="585" y="697" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#667085" letter-spacing="0"><tspan x="585" dy="0">Donut · six direct options</tspan></text><text x="1005" y="728" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="1005" dy="0">AWAITING n</tspan></text><rect x="1065" y="550" width="470" height="205" rx="22" fill="url(#pending)" fill-opacity="1" stroke="#145FCC" stroke-width="2" stroke-dasharray="10 8"/><rect x="1090" y="575" width="75" height="42" rx="21" fill="#145FCC" fill-opacity="1" stroke="#145FCC" stroke-width="1"/><text x="1127.5" y="603" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="0"><tspan x="1127.5" dy="0">Q08</tspan></text><text x="1090" y="655" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="1090" dy="0">Recalled failure mode</tspan></text><text x="1090" y="697" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#667085" letter-spacing="0"><tspan x="1090" dy="0">Horizontal bar · one main problem</tspan></text><text x="1510" y="728" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="1510" dy="0">AWAITING n</tspan></text><rect x="55" y="790" width="1490" height="60" rx="14" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="2"/><text x="85" y="829" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="85" dy="0">Gate: continue only if value improves without unacceptable relevance, effort, latency, or safety loss.</tspan></text>
</svg>