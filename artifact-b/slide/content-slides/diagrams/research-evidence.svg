<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Taste mismatch and repetition lead the complaint hierarchy</title>
  <desc id="desc">A source mix summary and horizontal bar chart show 266 discovery records, led by taste mismatch and repetition.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">Taste mismatch and repetition lead the complaint hierarchy</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">Observed Artifact A counts; direct labels preserve meaning without colour</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <rect x="50" y="170" width="430" height="650" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="80" y="220" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="80" dy="0">CORPUS</tspan></text><text x="80" y="292" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="80" dy="0">266</tspan></text><text x="80" y="334" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="80" dy="0">discovery-related records</tspan></text><text x="80" y="374" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="80" dy="0">14.4% of 1,850 collected records</tspan></text><text x="80" y="446" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="80" dy="0">SOURCE MIX</tspan></text><rect x="80" y="475" width="350" height="48" rx="8" fill="#ECE7DC" fill-opacity="1" stroke="#ECE7DC" stroke-width="2"/><rect x="80" y="475" width="227" height="48" rx="8" fill="#145FCC"/><rect x="307" y="475" width="104" height="48" fill="#247A5A"/><rect x="411" y="475" width="19" height="48" rx="8" fill="#D95D43"/><text x="80" y="565" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="80" dy="0">Google Play  1,200  (64.9%)</tspan><tspan x="80" dy="38">Reddit  550  (29.7%)</tspan><tspan x="80" dy="38">App Store  100  (5.4%)</tspan></text><rect x="80" y="700" width="350" height="80" rx="14" fill="#F8DDD6" fill-opacity="1" stroke="#D95D43" stroke-width="2"/><text x="100" y="733" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="100" dy="0">Complaint-enriched</tspan></text><text x="100" y="762" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="100" dy="0">Not population prevalence</tspan></text><text x="535" y="188" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="535" dy="0">TOP DISCOVERY THEMES</tspan></text><text x="1480" y="188" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#667085" letter-spacing="0"><tspan x="1480" dy="0">% of 266</tspan></text><text x="535" y="262" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">Taste mismatch</tspan></text><rect x="800" y="235" width="665" height="40" rx="8" fill="#ECE7DC" fill-opacity="1" stroke="#ECE7DC" stroke-width="2"/><rect x="800" y="235" width="756" height="40" rx="8" fill="#145FCC"/><text x="1480" y="263" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1480" dy="0">72  ·  27.1%</tspan></text><text x="535" y="349" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">Repetition</tspan></text><rect x="800" y="322" width="665" height="40" rx="8" fill="#ECE7DC" fill-opacity="1" stroke="#ECE7DC" stroke-width="2"/><rect x="800" y="322" width="735" height="40" rx="8" fill="#145FCC"/><text x="1480" y="350" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1480" dy="0">70  ·  26.3%</tspan></text><text x="535" y="436" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">Too similar</tspan></text><rect x="800" y="409" width="665" height="40" rx="8" fill="#ECE7DC" fill-opacity="1" stroke="#ECE7DC" stroke-width="2"/><rect x="800" y="409" width="525" height="40" rx="8" fill="#9DB4D6"/><text x="1480" y="437" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1480" dy="0">50  ·  18.8%</tspan></text><text x="535" y="523" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">Popular dominates</tspan></text><rect x="800" y="496" width="665" height="40" rx="8" fill="#ECE7DC" fill-opacity="1" stroke="#ECE7DC" stroke-width="2"/><rect x="800" y="496" width="514.5" height="40" rx="8" fill="#9DB4D6"/><text x="1480" y="524" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1480" dy="0">49  ·  18.4%</tspan></text><text x="535" y="610" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">Stale Discover Weekly</tspan></text><rect x="800" y="583" width="665" height="40" rx="8" fill="#ECE7DC" fill-opacity="1" stroke="#ECE7DC" stroke-width="2"/><rect x="800" y="583" width="504" height="40" rx="8" fill="#9DB4D6"/><text x="1480" y="611" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1480" dy="0">48  ·  18%</tspan></text><text x="535" y="697" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">Insufficient control</tspan></text><rect x="800" y="670" width="665" height="40" rx="8" fill="#ECE7DC" fill-opacity="1" stroke="#ECE7DC" stroke-width="2"/><rect x="800" y="670" width="483" height="40" rx="8" fill="#9DB4D6"/><text x="1480" y="698" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1480" dy="0">46  ·  17.3%</tspan></text><text x="535" y="804" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="650" fill="#667085" letter-spacing="0"><tspan x="535" dy="0">Multi-label coding: one record can contribute to more than one bar.</tspan></text>
</svg>