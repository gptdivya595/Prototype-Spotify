<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Evidence → product hypothesis → testable decision</title>
  <desc id="desc">A flow from 1,850 records to 266 discovery records, top mechanisms, the Discovery Compass hypothesis, and a paired validation gate.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">Evidence → product hypothesis → testable decision</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">One line of sight from Artifact A to the Artifact B gate</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <rect x="60" y="160" width="190" height="42" rx="21" fill="#DCE8F8" fill-opacity="1" stroke="#DCE8F8" stroke-width="1"/><text x="155" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#145FCC" letter-spacing="0"><tspan x="155" dy="0">OBSERVED EVIDENCE</tspan></text><rect x="60" y="220" width="345" height="180" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="84" y="278" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="45" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="84" dy="0">1,850</tspan></text><text x="84" y="319" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="84" dy="0">public records</tspan></text><text x="84" y="359" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="84" dy="0">App Store · Play · Reddit</tspan></text><line x1="405" y1="310" x2="440" y2="310" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="445" y="220" width="345" height="180" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="469" y="278" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="45" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="469" dy="0">266</tspan></text><text x="469" y="319" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="469" dy="0">discovery-related</tspan></text><text x="469" y="359" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="469" dy="0">14.4% of collected corpus</tspan></text><line x1="790" y1="310" x2="825" y2="310" stroke="#145FCC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="830" y="220" width="345" height="180" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><text x="854" y="278" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="45" font-weight="800" fill="#145FCC" letter-spacing="0"><tspan x="854" dy="0">72 / 70</tspan></text><text x="854" y="319" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="854" dy="0">top tagged mechanisms</tspan></text><text x="854" y="359" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="854" dy="0">taste mismatch / repetition</tspan></text><rect x="1215" y="220" width="325" height="180" rx="22" fill="#F8DDD6" fill-opacity="1" stroke="#D95D43" stroke-width="3"/><text x="1239" y="266" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="1239" dy="0">PROBLEM</tspan></text><text x="1239" y="310" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1239" dy="0">Past taste does not</tspan><tspan x="1239" dy="34">express current intent</tspan></text><line x1="1378" y1="400" x2="1378" y2="466" stroke="#D95D43" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="175" y="485" width="780" height="165" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><rect x="205" y="510" width="245" height="42" rx="21" fill="#247A5A" fill-opacity="1" stroke="#247A5A" stroke-width="1"/><text x="327.5" y="538" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="0"><tspan x="327.5" dy="0">CHOSEN HYPOTHESIS</tspan></text><text x="205" y="585" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="37" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="205" dy="0">Discovery Compass</tspan></text><text x="205" y="625" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#142033" letter-spacing="0"><tspan x="205" dy="0">Anchors + approved intent + novelty control + visible feedback</tspan></text><line x1="955" y1="568" x2="1030" y2="568" stroke="#247A5A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1050" y="485" width="490" height="165" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#142033" stroke-width="3"/><text x="1080" y="530" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="1080" dy="0">DECISION GATE</tspan></text><text x="1080" y="575" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="1080" dy="0">Does guided intent improve</tspan><tspan x="1080" dy="36">accepted novelty vs. baseline?</tspan></text><rect x="175" y="700" width="1365" height="96" rx="18" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="205" y="742" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="205" dy="0">Interpretation boundary</tspan></text><text x="205" y="778" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="600" fill="#142033" letter-spacing="0"><tspan x="205" dy="0">The corpus identifies mechanisms and language; it does not estimate prevalence among all Spotify users.</tspan></text>
</svg>