ight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="100" dy="0">1</tspan></text><text x="170" y="351" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="170" dy="0">Discovery Compass</tspan></text><text x="780" y="352" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="780" dy="0">9</tspan></text><text x="900" y="352" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="900" dy="0">7</tspan></text><text x="1020" y="352" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="1020" dy="0">6</tspan></text><rect x="1160" y="322" width="280" height="40" rx="8" fill="#FFFFFF" fill-opacity="1" stroke="#FFFFFF" stroke-width="2"/><rect x="1160" y="322" width="231" height="40" rx="8" fill="#247A5A"/><text x="1480" y="352" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#247A5A" letter-spacing="0"><tspan x="1480" dy="0">10.5</tspan></text><rect x="55" y="430" width="1490" height="115" rx="22" fill="#DCE8F8" fill-opacity="1" stroke="#145FCC" stroke-width="2"/><circle cx="100" cy="488" r="28" fill="#145FCC" stroke="#145FCC" stroke-width="2"/><text x="100" y="497" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="100" dy="0">2</tspan></text><text x="170" y="496" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="170" dy="0">Transparent Discovery Feed</tspan></text><text x="780" y="497" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="780" dy="0">6</tspan></text><text x="900" y="497" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="900" dy="0">5</tspan></text><text x="1020" y="497" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="1020" dy="0">4</tspan></text><rect x="1160" y="467" width="280" height="40" rx="8" fill="#FFFFFF" fill-opacity="1" stroke="#FFFFFF" stroke-width="2"/><rect x="1160" y="467" width="165" height="40" rx="8" fill="#145FCC"/><text x="1480" y="497" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="1480" dy="0">7.5</tspan></text><rect x="55" y="575" width="1490" height="115" rx="22" fill="#F8DDD6" fill-opacity="1" stroke="#D95D43" stroke-width="2"/><circle cx="100" cy="633" r="28" fill="#D95D43" stroke="#D95D43" stroke-width="2"/><text x="100" y="642" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#FFFFFF" letter-spacing="0"><tspan x="100" dy="0">3</tspan></text><text x="170" y="641" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="170" dy="0">Taste Profile Repair</tspan></text><text x="780" y="642" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="780" dy="0">8</tspan></text><text x="900" y="642" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="900" dy="0">6</tspan></text><text x="1020" y="642" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="1020" dy="0">8</tspan></text><rect x="1160" y="612" width="280" height="40" rx="8" fill="#FFFFFF" fill-opacity="1" stroke="#FFFFFF" stroke-width="2"/><rect x="1160" y="612" width="132" height="40" rx="8" fill="#D95D43"/><text x="1480" y="642" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#D95D43" letter-spacing="0"><tspan x="1480" dy="0">6.0</tspan></text><rect x="55" y="745" width="1490" height="92" rx="18" fill="#FFFFFF" fill-opacity="1" stroke="#9DB4D6" stroke-width="2"/><text x="85" y="783" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="85" dy="0">WHY #1</tspan></text><text x="225" y="790" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#142033" letter-spacing="0"><tspan x="225" dy="0">It tests the missing-intent mechanism directly, contains integration effort, and preserves a stop decision.</tspan></text><text x="85" y="824" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" fill="#667085" letter-spacing="0"><tspan x="85" dy="0">Sensitivity: re-score after survey and paired test; these numbers are judgment, not observed impact.</tspan></text>
</svg>