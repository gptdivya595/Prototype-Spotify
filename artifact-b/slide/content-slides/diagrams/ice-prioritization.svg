<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Discovery Compass leads the three options on directional ICE</title>
  <desc id="desc">A three-row ICE table ranks Discovery Compass, Transparent Discovery Feed, and Taste Profile Repair, with explicit impact, confidence, effort, and scores.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">Discovery Compass leads the three options on directional ICE</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">The score prioritises learning value—not certainty or long-term roadmap commitment</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
