<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The priority user seeks relevant novelty, not maximum novelty</title>
  <desc id="desc">A persona card for Asha, a central jobs-to-be-done statement, pains, and success outcomes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <pattern id="pending" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#FFFFFF"/>
      <rect width="4" height="16" fill="#DCE8F8"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#142033" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#F7F3E8"/>
  <text x="60" y="66" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="60" dy="0">The priority user seeks relevant novelty, not maximum novelty</tspan></text>
  <text x="60" y="108" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#667085" letter-spacing="0"><tspan x="60" dy="0">Proto-persona grounded in Artifact A behavior tags; validate identity details in interviews</tspan></text>
  <line x1="60" y1="132" x2="1540" y2="132" stroke="#9DB4D6" stroke-width="2" stroke-linecap="round"/>
  <rect x="55" y="165" width="205" height="42" rx="21" fill="#DCE8F8" fill-opacity="1" stroke="#DCE8F8" stroke-width="1"/><text x="157.5" y="193" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#145FCC" letter-spacing="0"><tspan x="157.5" dy="0">PRIMARY SEGMENT</tspan></text><rect x="55" y="225" width="400" height="585" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#145FCC" stroke-width="3"/><circle cx="130" cy="310" r="48" fill="#DCE8F8" stroke="#145FCC" stroke-width="3"/><text x="130" y="321" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#145FCC" letter-spacing="0"><tspan x="130" dy="0">AS</tspan></text><text x="200" y="298" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="850" fill="#142033" letter-spacing="0"><tspan x="200" dy="0">Asha</tspan></text><text x="200" y="337" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#145FCC" letter-spacing="0"><tspan x="200" dy="0">Active discovery seeker</tspan></text><line x1="85" y1="385" x2="425" y2="385" stroke="#ECE7DC" stroke-width="2" stroke-linecap="round"/><text x="85" y="430" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="85" dy="0">CONTEXT</tspan></text><text x="85" y="469" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="85" dy="0">Large listening history</tspan><tspan x="85" dy="38">Explores at least monthly</tspan><tspan x="85" dy="38">Mood and activity shift intent</tspan></text><text x="85" y="610" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#667085" letter-spacing="0"><tspan x="85" dy="0">OBSERVED WORKAROUNDS</tspan></text><text x="85" y="650" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#142033" letter-spacing="0"><tspan x="85" dy="0">Manual playlists</tspan><tspan x="85" dy="38">Private sessions</tspan><tspan x="85" dy="38">External discovery sources</tspan></text><rect x="500" y="225" width="645" height="585" rx="22" fill="#DDEFE6" fill-opacity="1" stroke="#247A5A" stroke-width="3"/><text x="535" y="275" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="535" dy="0">JOB TO BE DONE</tspan></text><text x="535" y="340" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">When I intentionally explore,</tspan><tspan x="535" dy="48">help me find music that is</tspan><tspan x="535" dy="48">unfamiliar enough to discover</tspan><tspan x="535" dy="48">but recognisable enough to fit</tspan><tspan x="535" dy="48">my current mood or activity—</tspan><tspan x="535" dy="48">without reshaping my profile.</tspan></text><text x="535" y="690" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="535" dy="0">Desired progress</tspan></text><text x="535" y="730" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750" fill="#142033" letter-spacing="0"><tspan x="535" dy="0">Relevant novelty with confidence and control</tspan></text><rect x="1190" y="225" width="355" height="270" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#D95D43" stroke-width="2"/><text x="1220" y="270" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#D95D43" letter-spacing="0"><tspan x="1220" dy="0">PAINS</tspan></text><text x="1220" y="315" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="1220" dy="0">Taste mismatch</tspan><tspan x="1220" dy="39">Repeated artists</tspan><tspan x="1220" dy="39">Too-similar results</tspan><tspan x="1220" dy="39">Feedback feels ignored</tspan></text><rect x="1190" y="530" width="355" height="280" rx="22" fill="#FFFFFF" fill-opacity="1" stroke="#247A5A" stroke-width="2"/><text x="1220" y="575" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#247A5A" letter-spacing="0"><tspan x="1220" dy="0">SUCCESS</tspan></text><text x="1220" y="620" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#142033" letter-spacing="0"><tspan x="1220" dy="0">Saves a new artist</tspan><tspan x="1220" dy="39">Understands the fit</tspan><tspan x="1220" dy="39">Can steer the next set</tspan><tspan x="1220" dy="39">Keeps familiar listening safe</tspan></text>
</svg>